      step_1:
        ai_message: |
          次に、APIトークンを設定します。
          
          以下の手順でAPIトークンを取得してください：
          
          1. https://universal-form-api.vercel.app/auth/ にログイン
          2. ダッシュボードで登録したサイトを選択
          3. 「編集」タブを開く
          4. 「APIトークン管理」セクションでトークンをコピー
          
          APIトークンを貼り付けてください（ufa_ で始まる長い文字列）:
      
      step_2:
        user_input: "ufa_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
        validation:
          - "ufa_ で始まるか確認"
          - "60文字以上あるか確認"
        
        on_invalid:
          message: |
            ⚠️ APIトークンの形式が正しくありません。
            
            正しい形式: ufa_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
            
            もう一度、管理画面からコピーして貼り付けてください。
      
      step_3:
        ai_action: "🚨 CRITICAL: write ツールで .env.local ファイルを自動作成（必須）"
        method: "write"
        file_path: ".env.local"
        
        execution_rule: |
          🚨 CRITICAL: AIが自動的にファイルを作成します。
          
          重要な注意事項:
          1. ユーザーに「手動で作成してください」と言ってはいけません
          2. 必ず write ツールを使用して、AIが作成します
          3. .env.local は .gitignore に含まれるため、サンドボックス制限がかかります
          4. 🚨 write ツール実行時は required_permissions: ['all'] を指定してください
          5. サンドボックスを無効化しないと、ファイル作成に失敗します
        
        sandbox_note: |
          ⚠️ サンドボックス制限について:
          
          .env.local は .gitignore に含まれるファイルのため、
          通常のサンドボックス環境では書き込みができません。
          
          解決策:
          - write ツール実行時に required_permissions: ['all'] を指定
          - これによりサンドボックスを無効化し、ファイル作成が可能になります
        
        content_template: |
          # Universal Form API - Token認証
          # 管理画面: https://universal-form-api.vercel.app/auth/
          
          NEXT_PUBLIC_FORM_API_TOKEN={api_token}
        
        handling_existing_file:
          description: "既存の .env.local がある場合の処理"
          steps:
            1: "read_file で既存内容を読み込む"
            2: "既存内容を保持しつつ、NEXT_PUBLIC_FORM_API_TOKEN を追加または更新"
            3: "既に NEXT_PUBLIC_FORM_API_TOKEN がある場合は上書き"
            4: "write ツールで保存"
          
          example_existing_content: |
            # 既存の環境変数
            NEXT_PUBLIC_API_URL=https://example.com
            DATABASE_URL=postgresql://...
          
          example_merged_content: |
            # 既存の環境変数
            NEXT_PUBLIC_API_URL=https://example.com
            DATABASE_URL=postgresql://...
            
            # Universal Form API - Token認証
            # 管理画面: https://universal-form-api.vercel.app/auth/
            
            NEXT_PUBLIC_FORM_API_TOKEN=ufa_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    
    gitignore_check:
      description: ".env.local が .gitignore に含まれているか確認"
      
      action: |
        1. .gitignore を read_file で読み込む
        2. .env.local が含まれているか確認
        3. 含まれていない場合は追加（search_replace）
      
      sandbox_note: |
        ⚠️ .gitignore の編集について:
        
        .gitignore 自体は通常のファイルなので、サンドボックス制限はかかりません。
        search_replace ツールで通常通り編集できます。
      
      add_to_gitignore: |
        # 環境変数（機密情報）
        .env.local
        .env*.local
    
    output:
      file: ".env.local"
      creation_method: "write ツールで自動作成（AIが実行）"
      
      message: |
        ✅ .env.local ファイルを作成しました
        
        ファイルパス: .env.local
        
        内容:
        ```
        # Universal Form API - Token認証
        # 管理画面: https://universal-form-api.vercel.app/auth/
        
        NEXT_PUBLIC_FORM_API_TOKEN={api_token}
        ```
        
        ⚠️ 重要:
        - このファイルはGitにコミットしないでください
        - .gitignore に追加済みです
        - ローカル開発環境でのみ使用されます
      
      next_step: |
        次のステップ: セキュリティ対策の確認に進みます

  step_5:
    name: "セキュリティ対策の確認"
    status: "MANDATORY"
    skip_allowed: false
    
    description: |
      生成したコンポーネントにセキュリティ対策が含まれているか確認。
    
    required_security:
      form_level:
        - "maxLength 属性（文字数制限）"
        - "pattern 属性（危険な文字の制限）"
        - "required 属性（必須項目指定）"
      
      javascript_level:
        - "escapeHtml() 関数（XSS対策）"
        - "sanitizeInput() 関数（HTMLタグ除去）"
        - "validateForm() 関数（送信前バリデーション）"
    
    validation:
      check_1: "escapeHtml() が実装されているか"
      check_2: "sanitizeInput() が実装されているか"
      check_3: "validateForm() が実装されているか"
      check_4: "フォーム要素に maxLength, pattern が設定されているか"
    
    output_on_success: |
      ✅ セキュリティ対策が実装されています
    
    output_on_failure: |
      ⚠️ 以下のセキュリティ対策が不足しています：
      - {missing_security_measures}

  step_6:
    name: "完了報告とテスト手順の提示"
    status: "MANDATORY"
    skip_allowed: false
    
    output_template: |
      ✅ お問い合わせフォームの実装が完了しました！
      
      📋 生成されたファイル:
      1. 管理画面登録用JSON（Token認証）
      2. HTMLメールテンプレート
      3. app/contact/page.tsx（フォームコンポーネント）
      4. .env.local（環境変数ファイル）← 自動作成済み
      
      🔧 次のステップ:
      
      【1】管理画面での登録
      1. https://universal-form-api.vercel.app/auth/ にログイン
         - ユーザー名: info メールアドレス
         - パスワード: アメリカン****@
      
      2. メールテンプレートを登録
         - 「テンプレート管理」→「＋ テンプレート追加」
         - テンプレートID: {site_id}_admin
         - 生成されたHTMLテンプレートをペースト
      
      3. サイトを登録
         - 「一括登録 (JSON)」ボタンをクリック
         - 生成されたJSONをペーストして登録
      
      4. APIトークンをコピー
         - サイト登録後、「編集」タブを開く
         - 「APIトークン管理」セクションでトークンをコピー
         - このトークンを Step 4 で入力済み
      
      【2】環境変数の設定（自動完了）
      ✅ .env.local ファイルは Step 4 で自動作成済みです
      
      内容:
      ```
      # Universal Form API - Token認証
      # 管理画面: https://universal-form-api.vercel.app/auth/
      
      NEXT_PUBLIC_FORM_API_TOKEN=ufa_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      ```
      
      ⚠️ 注意:
      - このファイルはGitにコミットしないでください
      - .gitignore に追加済みです
      
      【3】ローカルでのテスト
      ```bash
      npm run dev
      # http://localhost:3000/contact にアクセス
      ```
      1. すべてのフィールドに値を入力して送信
      2. 必須フィールドを空にしてエラー確認
      3. <script>alert('test')</script> を入力してセキュリティ確認
      
      【4】管理画面でのデータ確認
      1. 管理画面の「データ確認」を開く
      2. テストデータが保存されているか確認
      3. 通知メールが届いているか確認
      
      【5】本番環境への展開
      ```bash
      git add app/contact/page.tsx
      git commit -m "Add contact form with Token auth"
      git push origin main
      ```
      1. Vercel の環境変数に NEXT_PUBLIC_FORM_API_TOKEN を追加
      2. Vercel にデプロイ
      3. 本番環境からテスト送信
      
      ⚠️ 注意事項:
      - adminEmail は最初テスト用（info@propagete.inc）にしておく
      - 動作確認後、管理画面で本番用メールアドレスに変更
      - APIトークンは .env.local に保存（Git にコミットしない）
      - Token認証のため、ドメイン制限は不要

