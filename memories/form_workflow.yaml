# =============================================================================
# お問い合わせフォーム実装ワークフロー（v2.0.0）
# =============================================================================
# 目的: 既存フォームに Universal Form API 連携を追加（Token認証）
#
# 対象: Next.js + Tailwind CSS プロジェクト（DefaultSetting クローン）
# 作成日: 2025-11-07
# 最終更新: 2025-11-23
# =============================================================================

schema_version: "2.0.0"

metadata:
  workflow_name: "お問い合わせフォーム実装"
  target_framework: "Next.js 13+ (App Router) + Universal Form API (Token認証)"
  enforcement: "MANDATORY"
  version: "2.0.0"
  created: "2025-11-07"
  updated: "2025-11-23"
  author: "DefaultSetting Project"
  description: |
    既存フォームに Universal Form API 連携を追加（Token認証方式・メールテンプレート出力・環境変数自動設定）：
    1. 既存フォームからフィールド情報を収集
    2. 管理画面登録用JSON生成（Token認証）
    3. メールテンプレート生成（HTMLテンプレート）
    4. 既存フォームにAPI連携コードを追加（search_replace × 8箇所）
    5. 環境変数ファイル（.env.local）の作成
    6. セキュリティ対策の確認
    7. 完了報告
    
    v2.0.0: Token認証方式に切り替え、メールテンプレート出力フロー追加、.env.local自動作成

# =============================================================================
# トリガー設定
# =============================================================================
triggers:
  main_keywords:
    - "フォーム実装"
  
  note: |
    ⚠️ 注意: 誤発火を防ぐため、トリガーは「フォーム実装」のみに絞っています。
    - ❌ "お問い合わせフォームを作成して" → 通常のフォーム作成（発火しない）
    - ✅ "フォーム実装して" → Universal Form API を使ったフォーム実装（発火する）
    
    理由:
    デザインとしてフォームを作成する場合と、
    Universal Form API を使った完全なフォーム実装を区別するため。
  
  action_keywords:
    - "して"
    - "お願い"
    - "作成して"
    - "実装して"
    - "セットアップして"
    - "設定して"
  
  exclude_keywords:
    - "必要ですか"
    - "方法"
    - "教えて"
    - "説明"
    - "?"
    - "？"
  
  trigger_logic: |
    以下の条件をすべて満たす場合のみ実行：
    1. main_keywords のいずれかが含まれる（「フォーム実装」）
    2. action_keywords のいずれかが含まれる
    3. exclude_keywords が含まれない
  
  trigger_examples:
    ok:
      - "✅ フォーム実装して"
      - "✅ フォーム実装をお願い"
      - "✅ フォーム実装を作成して"
    
    ng:
      - "❌ お問い合わせフォームを作成して → main_keywords なし"
      - "❌ contactフォームを作って → main_keywords なし"
      - "❌ フォームを実装して → main_keywords「フォーム実装」が完全一致しない"
      - "❌ フォーム実装の方法は？ → exclude_keywords「方法」「？」"

# =============================================================================
# ワークフロー（7ステップ）
# =============================================================================
workflow:
  
  step_1:
    name: "サイト情報とフォームフィールドの決定"
    status: "CRITICAL"
    skip_allowed: false
    
    description: |
      app/ の実際のページファイルを見て、サイトの内容を分析し、
      フォーム実装に必要な情報を収集する。
      about.yaml は補完的に使用。
    
    information_sources:
      priority_1:
        name: "app/ のファイル（実際のページ）"
        method: |
          app/ ディレクトリのページファイルを見て、サイトの内容を分析する。
          特に、既存のフォームがあればそれを優先的に確認。
        
        process:
          1: "app/contact/page.tsx を確認（既存のフォームがあるか）"
          2: "既存フォームがある場合、そのフィールド構成を確認"
          3: "app/ 配下の他の page.tsx を検索（glob_file_search）"
          4: "各ページを read_file で読み込む"
          5: "ページの内容を分析（h1, h2, テキスト、セクション）"
          6: "会社の業種・サービス内容を特定"
          7: "適切なフォームフィールドを推測"
        
        existing_form_check:
          description: |
            app/contact/page.tsx または app/contact/ が既に存在する場合、
            そのフォームのフィールド構成を確認し、同じフィールドを使用する。
          
          extraction:
            - "<input name='...' /> のname属性を抽出"
            - "<label>...</label> のラベルテキストを抽出"
            - "required属性の有無を確認"
            - "type属性（text, email, textarea）を確認"
          
          priority: "既存フォームの構成を最優先"
        
        extraction:
          site_name:
            sources:
              - "app/page.tsx の h1 タグ"
              - "metadata.title"
              - "Hero セクションの会社名"
            example: "株式会社メディアプルーフ"
          
          business_type:
            sources:
              - "app/page.tsx のサービス説明"
              - "app/business/page.tsx の内容"
              - "主要なキーワード（校閲、IT、不動産など）"
            example: "校閲サービス業"
          
          admin_email:
            sources:
              - "Footer の連絡先"
              - "app/contact/ の既存フォーム"
            fallback: "info@example.com（デフォルト、ユーザーに確認）"
          
          production_domain:
            source: "vercel.json の BASE_URL"
            example: "https://www.example.jp"
          
          form_fields:
            method: |
              業種・サービス内容に応じて適切なフィールドを推測：
              - BtoB企業: 会社名、部署名
              - 予備校・教育: 学年、学校名
              - 不動産: 物件種別、希望エリア
              - 一般企業: 会社名、電話番号
            
            default: "name, email, company, phone, message（標準フィールド）"
            
            important_note: |
              ⚠️ CRITICAL: <select>要素を使う場合の注意
              - JSON の fields 配列では type: "text" と指定する
              - フロントエンドでは <select> タグを使用してOK
              - 理由: API側でのバリデーションのため
      
      priority_2:
        name: "about.yaml（補完的・基本情報のみ）"
        condition: "app/ のファイルで情報が不足する場合"
        note: |
          ⚠️ 重要: about.yaml からはフォームフィールド情報を取得しない。
          デザイン完成後にフォームが修正されている可能性があるため、
          フィールド情報は必ず app/contact/page.tsx から取得する。
          
          about.yaml からは基本情報（会社名、メールアドレス）のみ取得。
        
        extraction:
          site_name: "site.name"
          admin_email: "site.contact_defaults.email"
          
        not_extracted:
          form_fields: "❌ 取得しない（app/contact/page.tsx が正）"
      
      priority_3:
        name: "ユーザーに確認"
        condition: "app/ と about.yaml のどちらからも情報が取得できない場合"
        ask_user:
          - "サイトID（例: yourcompany）"
          - "会社名（例: 株式会社〇〇）"
          - "通知メールアドレス（例: info@example.com）"
          - "必要なフォームフィールド（例: 名前、メール、電話、会社名、メッセージ）"
    
    default_fields:
      description: "一般的なお問い合わせフォームの標準フィールド"
      fields:
        - name: "name"
          label: "お名前"
          type: "text"
          required: true
        
        - name: "email"
          label: "メールアドレス"
          type: "email"
          required: true
        
        - name: "company"
          label: "会社名"
          type: "text"
          required: false
        
        - name: "phone"
          label: "電話番号"
          type: "text"
          required: false
        
        - name: "message"
          label: "お問い合わせ内容"
          type: "textarea"
          required: true
    
    optional_fields:
      description: "必要に応じて追加できるフィールド"
      
      file_attachment:
        name: "attachments"
        label: "ファイル添付"
        type: "file"
        note: |
          ⚠️ 重要: ファイル添付はフィールド設定に追加不要
          - form-handler.js が <input type="file"> を自動検出
          - DBにはメタデータのみ保存（ファイルデータは保存されない）
          - メールに直接添付される
        
        restrictions:
          formats: "PDF, テキスト, ZIP"
          max_files: 5
          max_total_size: "4MB"
          note: "API側で制限（サイト側で変更不可）"
        
        html_example: |
          <input
            type="file"
            name="attachments"
            accept=".pdf,.txt,.zip"
            multiple
          />
          <p>.pdf/.txt/.zip対応 / 最大5ファイル, 合計4MBまで</p>
      
      image_attachment:
        name: "images"
        label: "画像添付"
        type: "file"
        note: |
          ⚠️ 重要: 画像添付はフィールド設定に追加不要
          - form-handler.js が <input type="file"> を自動検出
          - DBにはメタデータのみ保存（画像データは保存されない）
          - メールに直接添付される
        
        restrictions:
          formats: "JPEG, PNG, GIF, WebP"
          max_files: 5
          max_file_size: "4MB/ファイル"
          max_total_size: "4MB"
          note: "API側で制限（サイト側で変更不可）"
        
        html_example: |
          <input
            type="file"
            name="images"
            accept="image/jpeg,image/png,image/gif,image/webp"
            multiple
          />
          <p>JPEG, PNG, GIF, WebP対応 / 最大5枚, 合計4MBまで</p>
    
    output:
      collected_info:
        site_id: "string（英小文字・数字・アンダースコア(_)のみ、ハイフン使用不可）"
        site_name: "string"
        admin_email: "string"
        email_from_name: "string"
        email_subject: "string"
        production_domain: "string（Token認証では不要）"
        fields: "array"
      
      site_id_validation:
        allowed: "英小文字（a-z）、数字（0-9）、アンダースコア(_)"
        forbidden: "ハイフン（-）、大文字、スペース、特殊文字"
        reason: "Supabaseのテーブル名として使用されるため"
        examples:
          ok:
            - "mediaproof"
            - "next_maison"
            - "company123"
          ng:
            - "media-proof（ハイフン使用）"
            - "MediaProof（大文字使用）"
            - "media proof（スペース使用）"

  step_2:
    name: "管理画面登録用JSON生成（Token認証）"
    status: "CRITICAL"
    skip_allowed: false
    
    description: |
      step_1 で収集した情報を基に、
      Universal Form API の管理画面に登録するJSONを生成する。
      
      🚨 重要: Token認証方式を使用
      - requireToken: true に設定
      - productionDomain は不要（Token認証のため）
    
    template: |
      [
        {
          "id": "{site_id}",
          "siteName": "{site_name}",
          "adminEmail": "{admin_email}",
          "emailFromName": "{email_from_name}",
          "emailSubject": "{email_subject}",
          "emailTemplateId": "{site_id}_admin",
          "requireToken": true,
          "fields": [
            {FIELDS_ARRAY}
          ]
        }
      ]
    
    placeholder_replacement:
      site_id:
        source: "step_1 の site_id"
        example: "nextmaison"
        rule: "英小文字・数字・アンダースコア(_)のみ（ハイフンは使用不可、テーブル名として使用されるため）"
      
      site_name:
        source: "step_1 の site_name"
        example: "株式会社ネクストメゾン"
      
      admin_email:
        source: "step_1 の admin_email"
        example: "info@propagete.inc"
        note: "最初はテスト用、動作確認後に本番用に変更"
        multiple_addresses: "複数の場合はカンマ区切り（例: admin@example.com, manager@example.com）"
      
      email_from_name:
        source: "step_1 の email_from_name（site_name と同じでOK）"
        example: "株式会社ネクストメゾン"
      
      email_subject:
        source: "step_1 の email_subject"
        example: "【ネクストメゾン】新しいお問い合わせ"
        format: "【{site_name}】新しいお問い合わせ"
      
      require_token:
        value: true
        note: "Token認証を使用するため、必ずtrueに設定"
      
      fields_array:
        source: "step_1 の fields"
        format: |
          {
            "name": "name",
            "label": "お名前",
            "type": "text",
            "required": true
          },
          {
            "name": "email",
            "label": "メールアドレス",
            "type": "email",
            "required": true
          },
          ...
    
    output:
      file: "管理画面登録用のJSON（write ツールでファイル作成、またはチャット表示）"
      note: |
        このJSONを管理画面の「一括登録 (JSON)」にペーストして登録する。
        または、自動的にファイルに書き込んで、ユーザーがコピペする。

  step_2_5:
    name: "メールテンプレート生成（HTML）"
    status: "CRITICAL"
    skip_allowed: false
    
    description: |
      step_1 で収集したフィールド情報を基に、
      管理画面に登録するHTMLメールテンプレートを生成する。
      
      🚨 重要: 条件分岐機能を使用
      - 必須フィールド: {{#if field}}...{{/if}} で囲む
      - 任意フィールド: {{#if field}}...{{/if}} で囲み、未入力時のメッセージも追加
    
    template_structure:
      doctype: "<!DOCTYPE html>"
      charset: '<meta charset="UTF-8" />'
      style: "インラインCSS（メールクライアント対応）"
      header: "新しいお問い合わせがありました"
      fields: "step_1 の fields に基づいて動的生成"
      conditional: "任意フィールドは条件分岐で表示"
    
    template: |
      <!DOCTYPE html>
      <html>
        <head>
          <meta charset="UTF-8" />
          <title>お問い合わせ通知</title>
          <style>
            body {
              font-family: Arial, sans-serif;
              line-height: 1.6;
              color: #333;
            }
            .header {
              background-color: #f4f4f4;
              padding: 20px;
              text-align: center;
            }
            .field {
              margin-bottom: 15px;
              padding: 10px;
              background-color: #f9f9f9;
            }
            .label {
              font-weight: bold;
              color: #555;
            }
            .note {
              color: #999;
              font-size: 12px;
            }
          </style>
        </head>
        <body>
          <div class="header">
            <h2>新しいお問い合わせがありました</h2>
          </div>
          
          {FOR_EACH required field:}
          <div class="field">
            <div class="label">{field.label}</div>
            <div>{{field.name}}</div>
          </div>
          
          {FOR_EACH optional field:}
          {{#if field.name}}
          <div class="field">
            <div class="label">{field.label}</div>
            <div>{{field.name}}</div>
          </div>
          {{/if}}
          
          {FOR_EACH optional field (未入力メッセージ):}
          {{^field.name}}
          <div class="note">※ {field.label}は入力されませんでした</div>
          {{/field.name}}
        </body>
      </html>
    
    generation_rules:
      required_fields:
        description: "必須フィールドは常に表示"
        format: |
          <div class="field">
            <div class="label">{field.label}</div>
            <div>{{field.name}}</div>
          </div>
      
      optional_fields:
        description: "任意フィールドは条件分岐で表示"
        format: |
          {{#if field.name}}
          <div class="field">
            <div class="label">{field.label}</div>
            <div>{{field.name}}</div>
          </div>
          {{/if}}
          
          {{^field.name}}
          <div class="note">※ {field.label}は入力されませんでした</div>
          {{/field.name}}
    
    example_output:
      description: "name, email（必須）、company, phone（任意）、message（必須）の場合"
      template: |
        <!DOCTYPE html>
        <html>
          <head>
            <meta charset="UTF-8" />
            <title>お問い合わせ通知</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                line-height: 1.6;
                color: #333;
              }
              .header {
                background-color: #f4f4f4;
                padding: 20px;
                text-align: center;
              }
              .field {
                margin-bottom: 15px;
                padding: 10px;
                background-color: #f9f9f9;
              }
              .label {
                font-weight: bold;
                color: #555;
              }
              .note {
                color: #999;
                font-size: 12px;
              }
            </style>
          </head>
          <body>
            <div class="header">
              <h2>新しいお問い合わせがありました</h2>
            </div>
            <div class="field">
              <div class="label">お名前</div>
              <div>{{name}}</div>
            </div>
            <div class="field">
              <div class="label">メールアドレス</div>
              <div>{{email}}</div>
            </div>
            {{#if company}}
            <div class="field">
              <div class="label">会社名</div>
              <div>{{company}}</div>
            </div>
            {{/if}}
            {{#if phone}}
            <div class="field">
              <div class="label">電話番号</div>
              <div>{{phone}}</div>
            </div>
            {{/if}}
            <div class="field">
              <div class="label">お問い合わせ内容</div>
              <div>{{message}}</div>
            </div>
            {{^company}}
            <div class="note">※ 会社名は入力されませんでした</div>
            {{/company}}
            {{^phone}}
            <div class="note">※ 電話番号は入力されませんでした</div>
            {{/phone}}
          </body>
        </html>
    
    output:
      file: "HTMLメールテンプレート（チャット表示）"
      template_id: "{site_id}_admin"
      note: |
        このHTMLテンプレートを管理画面の「テンプレート管理」で登録する。
        テンプレートID: {site_id}_admin（例: mediaproof_admin）

  step_3:
    name: "既存フォームにAPI連携を追加"
    status: "CRITICAL"
    skip_allowed: false
    
    description: |
      既存の app/contact/page.tsx を読み込み、
      Universal Form API 連携のためのコードを追加・修正する。
      
      🚨 重要: 既存のデザイン・レイアウト・classNameはそのまま保持。
      API連携に必要な部分のみを追加。
    
    method: "search_replace（既存ファイルを修正）"
    
    modification_steps:
      note: |
        以下の8つの修正を順番に search_replace で実行。
        既存のコードは可能な限り保持し、必要な部分のみ追加・修正する。
        
        🚨 TypeScript ESLint エラー防止:
        - any 型を使用しない（Record<string, string>, unknown を使用）
        - isSubmitting は送信ボタンで使用（disabled, テキスト変更）
        - useEffect の exhaustive-deps 警告を抑制
      
      step_1_add_use_client:
        description: '"use client" ディレクティブを追加'
        method: "search_replace"
        find: "ファイルの先頭（import の前、またはファイル開始）"
        add: '"use client";\n\n'
        note: "既に存在する場合はスキップ"
      
      step_2_add_imports:
        description: "必要な import を追加"
        method: "search_replace"
        imports_to_add:
          - 'import { useEffect, useState } from "react";'
          - 'import Script from "next/script";'
        find: "既存の import 文の最後、または export の直前"
        note: "既に存在する import は重複しないよう確認"
      
      step_3_add_state:
        description: "useState を追加"
        method: "search_replace"
        find: "export default function ContactForm() { の直後"
        add: |
          const [status, setStatus] = useState<{
            type: "success" | "error" | null;
            message: string;
          }>({ type: null, message: "" });
          const [isSubmitting, setIsSubmitting] = useState(false);
          // eslint-disable-next-line @typescript-eslint/no-unused-vars
          const [formHandlerLoaded, setFormHandlerLoaded] = useState(false);
        note: "return の前に追加"
      
      step_4_add_security_functions:
        description: "セキュリティ関数を追加（3つ）"
        method: "search_replace"
        find: "useState の後、return の前"
        add: |
          function escapeHtml(text: string) {
            const map: { [key: string]: string } = {
              "&": "&amp;", "<": "&lt;", ">": "&gt;",
              '"': "&quot;", "'": "&#039;",
            };
            return text.replace(/[&<>"']/g, (m) => map[m]);
          }
          
          function sanitizeInput(value: string | undefined | null): string | undefined | null {
            if (typeof value !== "string") return value;
            const cleanValue = value.trim().replace(/<[^>]*>/g, "");
            return cleanValue.length > 5000
              ? cleanValue.substring(0, 5000) + "..."
              : cleanValue;
          }
          
          function validateForm(formData: Record<string, string>): string[] {
            const errors: string[] = [];
            // 必須フィールドチェック（step_1で決定したrequiredフィールドに基づく）
            {FOR_EACH required field}
            return errors;
          }
      
      step_5_add_form_handler:
        description: "useEffect と initializeFormHandler を追加"
        method: "search_replace"
        find: "セキュリティ関数の後、return の前"
        add: |
          useEffect(() => {
            // eslint-disable-next-line @typescript-eslint/no-explicit-any
            if ((window as any).FormHandler) {
              setFormHandlerLoaded(true);
              initializeFormHandler();
            }
          }, []);
          
          function initializeFormHandler() {
            // eslint-disable-next-line @typescript-eslint/no-explicit-any
            if (typeof window === "undefined" || !(window as any).FormHandler) return;
            
            // Token認証を使用する場合（推奨）
            // eslint-disable-next-line @typescript-eslint/no-explicit-any
            (window as any).FormHandler.init("{site_id}", process.env.NEXT_PUBLIC_FORM_API_TOKEN || "", {
              apiBaseUrl: "https://universal-form-api.vercel.app",
              beforeSend: function (formData: Record<string, string>): Record<string, string> | false {
                const sanitizedData: Record<string, string> = {};
                Object.keys(formData).forEach((key) => {
                  // _attachments はそのまま維持（画像・ファイル添付用）
                  if (key === "_attachments") {
                    sanitizedData[key] = formData[key];
                    return;
                  }
                  const sanitized = sanitizeInput(formData[key]);
                  sanitizedData[key] = sanitized ?? "";
                });
                const errors = validateForm(sanitizedData);
                if (errors.length > 0) {
                  setStatus({ type: "error", message: `エラー: ${escapeHtml(errors.join(", "))}` });
                  setIsSubmitting(false);
                  return false;
                }
                return sanitizedData;
              },
              onSuccess: function (response: unknown) {
                console.log("送信成功:", response);
                setIsSubmitting(false);
                setStatus({ type: "success", message: "送信完了しました。ありがとうございます。" });
                const form = document.getElementById("contactForm") as HTMLFormElement | null;
                if (form) form.reset();
              },
              onError: function (error: string) {
                console.error("送信エラー:", error);
                setIsSubmitting(false);
                setStatus({ type: "error", message: `送信エラー: ${escapeHtml(error)}` });
              },
            });
          }
          
          function handleSubmit(e: React.FormEvent) {
            setIsSubmitting(true);
            setStatus({ type: null, message: "" });
          }
        
        critical_notes:
