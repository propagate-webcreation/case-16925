        🚨 pattern属性について:
        FORMREADME.md の469行目と506行目に記載されている pattern属性を使用:
          pattern="[^\<\>\&\"\']+"
        
        この値をそのままコピーしてください（文字コード変換しない）。
        
        重要なポイント:
        - pattern属性: FORMREADME.md から直接コピー
        - SDK URL: https://universal-form-api.vercel.app/form-handler.js
        - フォームid: "contactForm"
      
      template: |
        "use client";
        
        import { useEffect, useState } from "react";
        import Script from "next/script";
        
        export default function ContactForm() {
          const [status, setStatus] = useState<{
            type: "success" | "error" | null;
            message: string;
          }>({ type: null, message: "" });
          const [isSubmitting, setIsSubmitting] = useState(false);
          // eslint-disable-next-line @typescript-eslint/no-unused-vars
          const [formHandlerLoaded, setFormHandlerLoaded] = useState(false);
        
          useEffect(() => {
            // FormHandlerが読み込まれているかチェック
            // eslint-disable-next-line @typescript-eslint/no-explicit-any
            if ((window as any).FormHandler) {
              setFormHandlerLoaded(true);
              initializeFormHandler();
            }
          }, []);
        
          // XSS対策: テキストをエスケープする関数
          function escapeHtml(text: string) {
            const map: { [key: string]: string } = {
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#039;",
            };
            return text.replace(/[&<>"']/g, function (m) {
              return map[m];
            });
          }
        
          // 入力値サニタイズ関数
          function sanitizeInput(value: string | undefined | null): string | undefined | null {
            if (typeof value !== "string") return value;
        
            // HTMLタグを除去し、最大長制限
            const cleanValue = value.trim().replace(/<[^>]*>/g, "");
            return cleanValue.length > 5000
              ? cleanValue.substring(0, 5000) + "..."
              : cleanValue;
          }
        
          // フォーム送信前のバリデーション
          function validateForm(formData: Record<string, string>): string[] {
            const errors: string[] = [];
        
            // 必須フィールドチェック
            if (!formData.name || formData.name.trim() === "") {
              errors.push("お名前は必須です");
            }
            if (!formData.email || formData.email.trim() === "") {
              errors.push("メールアドレスは必須です");
            }
            if (!formData.message || formData.message.trim() === "") {
              errors.push("メッセージは必須です");
            }
        
            // メールアドレス形式チェック
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (formData.email && !emailPattern.test(formData.email)) {
              errors.push("メールアドレスの形式が正しくありません");
            }
        
            return errors;
          }
        
          function initializeFormHandler() {
            // eslint-disable-next-line @typescript-eslint/no-explicit-any
            if (typeof window === "undefined" || !(window as any).FormHandler) return;
        
            // Token認証を使用する場合（推奨）
            // eslint-disable-next-line @typescript-eslint/no-explicit-any
            (window as any).FormHandler.init("your-site-id", process.env.NEXT_PUBLIC_FORM_API_TOKEN || "", {
              apiBaseUrl: "https://universal-form-api.vercel.app",
              beforeSend: function (formData: Record<string, string>): Record<string, string> | false {
                const sanitizedData: Record<string, string> = {};
                Object.keys(formData).forEach((key) => {
                  const sanitized = sanitizeInput(formData[key]);
                  sanitizedData[key] = sanitized ?? "";
                });
        
                const errors = validateForm(sanitizedData);
                if (errors.length > 0) {
                  setStatus({
                    type: "error",
                    message: `エラー: ${escapeHtml(errors.join(", "))}`,
                  });
                  setIsSubmitting(false);
                  return false;
                }
        
                return sanitizedData;
              },
        
              onSuccess: function (response: unknown) {
                console.log("送信成功:", response);
                setIsSubmitting(false);
                setStatus({
                  type: "success",
                  message: "送信完了しました。ありがとうございます。",
                });
        
                const form = document.getElementById("contactForm") as HTMLFormElement | null;
                if (form) {
                  form.reset();
                }
              },
        
              onError: function (error: string) {
                console.error("送信エラー:", error);
                setIsSubmitting(false);
                setStatus({
                  type: "error",
                  message: `送信エラー: ${escapeHtml(error)}`,
                });
              },
            });
          }
        
          function handleSubmit(e: React.FormEvent) {
            setIsSubmitting(true);
            setStatus({ type: null, message: "" });
          }
        
          return (
            <div className="max-w-2xl mx-auto p-6">
              <h2 className="text-2xl font-bold mb-6">お問い合わせフォーム</h2>
        
              <form id="contactForm" onSubmit={handleSubmit}>
                {/* フィールドは step_1 で決定した fields に基づいて生成 */}
              </form>
        
              {/* ステータスメッセージ */}
              {status.type && (
                <div
                  className={`mt-6 p-4 rounded-md border ${
                    status.type === "success"
                      ? "bg-green-50 border-green-200 text-green-800"
                      : "bg-red-50 border-red-200 text-red-800"
                  }`}
                >
                  <pre className="whitespace-pre-wrap">{status.message}</pre>
                </div>
              )}
        
              {/* FormHandler SDK読み込み */}
              <Script
                src="https://universal-form-api.vercel.app/form-handler.js"
                onLoad={() => {
                  setFormHandlerLoaded(true);
                  initializeFormHandler();
                }}
              />
            </div>
          );
        }
    
