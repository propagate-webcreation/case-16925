# =============================================================================
# Google提出 自動化ワークフロー（v1.4.0）
# =============================================================================
# 目的: Google Search Console への提出に必要な設定を自動化
#
# 対象: Next.js + Tailwind CSS プロジェクト（DefaultSetting クローン）
# 作成日: 2025-11-04
# 最終更新: 2025-11-04
# =============================================================================

schema_version: "1.4.0"

metadata:
  workflow_name: "Google提出 自動化"
  target_framework: "Next.js 13+ (App Router)"
  enforcement: "MANDATORY"
  version: "1.4.0"
  created: "2025-11-04"
  updated: "2025-11-04"
  author: "DefaultSetting Project"
  description: |
    Google提出に必要な5つのタスクを完全自動化：
    1. altタグ設定（包括的検出 + コンテキスト分析で自動生成）
    2. metadata 設定（title, description, keywords, openGraph, twitter）
    3. sitemap.ts 作成（外部URL混入防止）
    4. robots.txt 作成
    5. URLスラッグ最適化（サイト内容を分析して提案）
    
    v1.4.0: すべてのワークフローで「どう読み込むか」を明示し、AIが確実に実行できるよう改善

# =============================================================================
# トリガー設定
# =============================================================================
triggers:
  main_keywords:
    - "Google提出"
  
  action_keywords:
    - "して"
    - "お願い"
    - "作成して"
    - "セットアップして"
    - "設定して"
  
  exclude_keywords:
    - "必要ですか"
    - "方法"
    - "教えて"
    - "説明"
    - "?"
    - "？"

# =============================================================================
# ワークフロー1: altタグ設定
# =============================================================================
workflow_1_alt_tags:
  
  name: "画像の alt 属性を自動設定"
  description: "AIが画像のコンテキストを分析して、適切な alt 属性を自動設定"
  
  process:
    step_1:
      action: "画像の使用状況を包括的に検出"
      
      method:
        description: "複数の検索パターンで画像使用を網羅的に検出"
        
        search_patterns:
          pattern_1:
            name: "Image コンポーネント"
            tool: "grep"
            pattern: "Image"
            targets: ["app/**/*.tsx", "app/components/**/*.tsx"]
            context: "-B 3 -A 3"
            note: "改行されている場合も検出"
          
          pattern_2:
            name: "img タグ"
            tool: "grep"
            pattern: "img"
            targets: ["app/**/*.tsx", "app/components/**/*.tsx"]
            context: "-B 3 -A 3"
            note: "HTML標準のimgタグ"
          
          pattern_3:
            name: "画像パス参照"
            tool: "grep"
            pattern: '"/img/'
            targets: ["app/**/*.tsx", "app/components/**/*.tsx"]
            context: "-B 3 -A 3"
            note: "すべての /img/ 参照を検出（CSS背景画像含む）"
          
          pattern_4:
            name: "CSS背景画像"
            tool: "grep"
            pattern: "bg-\\[url|background-image|backgroundImage"
            targets: ["app/**/*.tsx", "app/components/**/*.tsx", "app/globals.css"]
            context: "-B 3 -A 3"
            note: "Tailwind bg-[url(...)] と通常CSS の両方"
        
        comprehensive_check:
          description: |
            上記4つのパターンで検索し、すべての画像使用箇所を検出。
            検出結果を統合して、重複を除外。
      
      detection_logic:
        for_image_tags:
          description: "<Image> と <img> タグの検出"
          check: "alt 属性の有無を確認"
          action: "alt がない場合のみリストアップ"
        
        for_css_background:
          description: "CSS背景画像の検出"
          note: |
            🚨 重要: CSS背景画像には alt 属性を設定できません。
            装飾的な画像として扱い、代替テキストが必要な場合は：
            - aria-label 属性を親要素に追加
            - または、画像の説明テキストを近くに配置
          
          action: "検出のみ（実装はスキップ）"
          report: "装飾的な背景画像として使用されていることを報告"
    
    step_2:
      action: "各画像ファイルを read_file で読み込み、コンテキストを分析"
      
      analysis_materials:
        1_filename:
          source: "画像の src 属性"
          examples:
            - "logo.png → ロゴ"
            - "hero-bg.jpg → メインビジュアル"
            - "office.jpg → オフィス"
            - "team.png → チーム"
        
        2_context:
          source: "画像の周辺コード（前後2行）"
          examples:
            - "<section className='hero'> → ヒーローセクション"
            - "<h1>会社概要</h1> の後 → 会社概要関連"
            - "<header> 内 → ヘッダー"
            - "<footer> 内 → フッター"
        
        3_classname:
          source: "画像タグの className"
          examples:
            - "className='company-logo' → 会社のロゴ"
            - "className='service-icon' → サービスアイコン"
        
        4_company_info:
          source: "about.yaml の site.name（可能な場合）"
          usage: "会社名を含める（例: 株式会社〇〇のロゴ）"
        
        5_surrounding_text:
          source: "画像の前後のテキストノード"
          examples:
            - "<p>東京オフィス</p><Image src='...' /> → 東京オフィス"
            - "<h2>サービス紹介</h2> の下 → サービス関連"
    
    step_3:
      action: "alt テキストを自動生成"
      
      generation_algorithm: |
        1. ファイル名を解析（logo, hero, office など）
        2. 周辺コンテキストを解析（hero セクション、header など）
        3. className を解析（company-logo など）
        4. about.yaml から会社名を取得（可能な場合）
        5. 上記を組み合わせて最適な alt テキストを生成
      
      generation_rules:
        - "ファイル名の意味を日本語化（logo → ロゴ）"
        - "コンテキストを考慮（hero セクション内 → 〇〇のメインビジュアル）"
        - "会社名/サービス名を含める（可能な場合）"
        - "簡潔で具体的な説明（15字以内推奨）"
        - "「画像」「写真」などの冗長な語は避ける"
      
      examples:
        example_1:
          image: '<Image src="/logo.png" />'
          context: '<header> 内'
          filename: "logo.png"
          company_name: "株式会社メディアプルーフ"
          generated_alt: "株式会社メディアプルーフのロゴ"
        
        example_2:
          image: '<Image src="/hero-bg.jpg" />'
          context: '<section className="hero">'
          filename: "hero-bg.jpg"
          service: "校閲サービス"
          generated_alt: "校閲サービスのメインビジュアル"
        
        example_3:
          image: '<img src="/office.jpg" />'
          context: '<p>東京オフィス</p> の下'
          filename: "office.jpg"
          surrounding_text: "東京オフィス"
          generated_alt: "東京オフィスの外観"
        
        example_4:
          image: '<Image src="/icon-service.svg" className="service-icon" />'
          context: '<section> サービス紹介'
          filename: "icon-service.svg"
          classname: "service-icon"
          generated_alt: "サービスアイコン"
    
    step_4:
      action: "alt 属性を追加"
      
      method:
        tool: "search_replace"
        
        process: |
          1. 検出した画像タグを old_string とする
          2. alt="{生成したテキスト}" を追加した画像タグを new_string とする
          3. search_replace で置換
        
        examples:
          example_1:
            old_string: '<Image src="/logo.png" width={100} height={50} />'
            new_string: '<Image src="/logo.png" alt="株式会社メディアプルーフのロゴ" width={100} height={50} />'
          
          example_2:
            old_string: '<img src="/office.jpg" className="rounded-lg" />'
            new_string: '<img src="/office.jpg" alt="東京オフィスの外観" className="rounded-lg" />'
        
        position: "src 属性の直後に alt 属性を挿入"
  
  output:
    template: |
      ✅ 画像に alt 属性を設定しました
      
      【<Image> / <img> タグ】
      更新したファイル:
      - {file_list}
      
      追加した alt 属性:
      - {image_path}: "{alt_text}"
      - {image_path}: "{alt_text}"
      
      【CSS背景画像】
      検出された背景画像:
      - {bg_image_1}（装飾的な画像として使用）
      - {bg_image_2}（装飾的な画像として使用）
      
      💡 注意:
      - CSS背景画像には alt 属性を設定できません
      - 装飾的な画像として扱われるため、SEO上問題ありません
      - 重要な情報を含む場合は、<Image> タグに変更することを推奨
      
      💡 確認:
      生成された alt テキストが適切か確認し、必要に応じて手動で修正してください。

# =============================================================================
# ワークフロー2: metadata 設定
# =============================================================================
workflow_2_metadata:
  
  name: "app/layout.tsx に metadata を設定"
  description: "title, description, keywords, openGraph, twitter を含む完全なSEO設定"
  
  process:
    step_1:
      action: "app/layout.tsx を読み込み、既存 metadata を確認"
      
      method:
        tool: "read_file"
        target: "app/layout.tsx"
      
      detection:
        pattern: "export const metadata"
        check: |
          1. "export const metadata: Metadata = {" を検索
          2. 既存の title, description, keywords を抽出
      
      extraction_example: |
        // layout.tsx
        export const metadata: Metadata = {
          title: "株式会社メディアプルーフ - 東京の校閲サービス",
          description: "...",
          keywords: ["校閲", "東京"],
        };
        
        抽出結果:
        - existing_title: "株式会社メディアプルーフ - 東京の校閲サービス"
        - existing_description: "..."
        - existing_keywords: ["校閲", "東京"]
    
    step_2:
      action: "情報源の優先順位に従って情報収集"
      
      priority_1:
        name: "既存 metadata（layout.tsx）"
        condition: "title, description, keywords すべて存在"
        action: "既存の値を再利用（ドメイン接続で設定済みの可能性）"
        
        reuse_strategy: |
          - title: そのまま使用
          - description: そのまま使用
          - keywords: そのまま使用
          - openGraph, twitter: 既存の値を流用して新規生成
      
      priority_2:
        name: "about.yaml（サイト構成シート）"
        condition: "既存 metadata がない、または不完全"
        
        method:
          tool: "read_file"
          target: "about.yaml"
          
          process: |
            1. read_file で about.yaml を読み込む
            2. YAML をパースして site セクションを取得
            3. 以下の情報を抽出
        
        extraction:
          company_name:
            source: "site.name"
            example: "株式会社メディアプルーフ"
          
          service_area:
            source: "site.contact_defaults.address"
            extraction: "都道府県・市区を抽出"
            example: "東京都新宿区西新宿..." → "東京"
          
          main_message:
            source: "site.pages[0].sections[0].content.heading"
            example: "メディアの正しさを担保"
          
          services:
            source: "site.pages で id: business のもの、または sections で type: service-detail のもの"
            example: ["ニュース番組", "広告制作物", "公共案件"]
        
        if_not_available:
          action: "about.yaml が読めない場合は priority_3 に進む"
      
      priority_3:
        name: "app/page.tsx（コードファイル）"
        condition: "about.yaml もない、または読み取れない"
        
        method:
          tool: "read_file"
          targets:
            - "app/page.tsx"
            - "app/components/Header.tsx（可能な場合）"
            - "app/components/Footer.tsx（可能な場合）"
          
          process: |
            1. read_file で app/page.tsx を読み込む
            2. コード内から以下の情報を抽出
            3. Header, Footer コンポーネントも読み込んで情報を補完
        
        extraction:
          company_name:
            sources:
              - "page.tsx の h1タグ（例: <h1>株式会社メディアプルーフ</h1>）"
              - "hero セクションの見出し"
              - "Header コンポーネントのロゴテキスト"
            extraction_method: "正規表現で <h1>...</h1> を抽出"
            example: "株式会社メディアプルーフ"
          
          service_description:
            sources:
              - "hero セクションの本文（<p>...</p>）"
              - "メインコンテンツの説明文"
            extraction_method: "hero クラス名を持つ section 内のテキストを抽出"
            example: "メディアの正しさを担保する校閲サービス"
          
          service_area:
            sources:
              - "Footer コンポーネントの住所"
              - "Contact ページの住所"
            extraction_method: "住所パターン（都道府県名）を正規表現で抽出"
            example: "東京都新宿区西新宿..." → "東京"
          
          services:
            sources:
              - "サービスカード（className='service-card' など）"
              - "Navigation メニュー（<Link> のラベル）"
            extraction_method: "見出しタグ（h2, h3）またはカード内のテキストを抽出"
            example: ["校閲サービス", "ニュース番組", "広告制作"]
        
        if_not_available:
          action: "すべての情報源が読めない場合は、このワークフローをスキップ"
    
    step_3:
      action: "title, description, keywords を生成（必要な場合のみ）"
      
      note: |
        既存 metadata がある場合（ドメイン接続で設定済み）は新規生成をスキップ。
        既存の値を再利用して openGraph, twitter のみ生成（step_4）。
      
      # キーワード生成（市場分析）
      keywords_generation:
        condition: "既存 keywords がない場合のみ"
        
        market_analysis:
          step_1:
            action: "市場・競合・検索意図を分析"
            method: |
              - 上位10サイトを想定して頻出語を分析
              - 利用者ペルソナを要約
              - 検索意図（情報収集/比較検討/問い合わせ）を特定
          
          step_2:
            action: "一次キーワード（5語）を選定"
            criteria:
              - "会社名/サービス名（必須）"
              - "主要地域 + サービス（例: 東京 校閲）"
              - "業界キーワード（例: 校閲、メディア）"
              - "事業内容キーワード（例: ニュース番組）"
            
            with_metadata:
              - "検索ボリューム推定（Low/Mid/High）"
              - "競合難易度（Low/Mid/High）"
            
            example: |
              1. 株式会社メディアプルーフ（検索ボリューム: Low, 競合: Low）
              2. 校閲サービス 東京（検索ボリューム: Mid, 競合: Mid）
              3. ニュース番組 校閲（検索ボリューム: Low, 競合: Low）
              4. メディア 校正（検索ボリューム: High, 競合: High）
              5. 広告制作 校閲（検索ボリューム: Mid, 競合: Mid）
        
        count: 5
        format: ["キーワード1", "キーワード2", "キーワード3", "キーワード4", "キーワード5"]
      
      # タイトルタグ生成
      title_generation:
        condition: "既存 title がない場合のみ"
        
        required_elements:
          - "会社名（サービス名）"
          - "主要地域"
          - "一次キーワード"
          - "CTA動詞 or ベネフィット（例: ｜24時間受付）"
        
        length:
          min: 28
          max: 32
          unit: "全角字"
          pixel_limit: "600px以内"
        
        format: "会社名 - サービス エリア | キーワード | ベネフィット"
        
        rules:
          - "数字は半角、単位は全角（例：24時間、365日）"
          - "同一語句の連続は2回まで"
          - "句読点は「、」「。」を使用"
          - "英字間は半角スペース"
        
        example: "株式会社メディアプルーフ - 東京の校閲サービス | メディアの正しさを担保（32 文字）"
      
      # メタディスクリプション生成
      description_generation:
        condition: "既存 description がない場合のみ"
        
        keyword_usage:
          primary: "一次KWを2-3回自然に含める"
          secondary: "二次KWを1-2回含める"
        
        length:
          min: 90
          max: 120
          recommended: 110
          unit: "全角字"
          pixel_range: "550-680px"
          note: "途中で「…」が入らないよう110字前後推奨"
        
        structure:
          - "会社の紹介"
          - "サービス内容・特徴"
          - "ベネフィット"
          - "行動喚起（電話・フォーム）"
        
        rules:
          - "数字は半角、単位は全角（例：24時間、365日）"
          - "ネガティブ語は使用しない（例：孤独死など）"
          - "同一語句の連続は2回まで"
          - "句読点は「、」「。」を使用"
          - "英字間は半角スペース"
        
        example: "株式会社メディアプルーフは、ニュース番組・広告・公共案件の校閲に特化したサービスを提供。誤字脱字のチェックに留まらず、ウラ取り・修正案の提示まで対応。東京都新宿区を拠点に、高度な校閲で制作物の品質と信頼を守ります。お気軽にお問い合わせください。（120 文字）"
    
    step_4:
      action: "openGraph と twitter を生成（常に実行）"
      
      openGraph:
        template: |
          openGraph: {
            title: "{title}",
            description: "{description}",
            type: "website",
            locale: "ja_JP",
          }
        
        note: "既存 or 新規生成した title, description を使用"
      
      twitter:
        template: |
          twitter: {
            card: "summary_large_image",
            title: "{title}",
            description: "{description}",
          }
    
    step_5:
      action: "layout.tsx を更新"
      
      method:
        tool: "search_replace"
        
        case_1_existing_metadata:
          description: "既存 metadata がある場合は置換"
          
          find_pattern: |
            export const metadata: Metadata = {
              // 既存の内容すべて
            };
          
          replace_with: |
            export const metadata: Metadata = {
              title: "{title}",
              description: "{description}",
              keywords: [{keywords}],
              openGraph: {
                title: "{title}",
                description: "{description}",
                type: "website",
                locale: "ja_JP",
              },
              twitter: {
                card: "summary_large_image",
                title: "{title}",
                description: "{description}",
              },
            };
        
        case_2_no_metadata:
          description: "metadata がない場合は新規追加"
          
          find_position: "export default function RootLayout の直前"
          
          insert: |
            export const metadata: Metadata = {
              title: "{title}",
              description: "{description}",
              keywords: [{keywords}],
              openGraph: {
                title: "{title}",
                description: "{description}",
                type: "website",
                locale: "ja_JP",
              },
              twitter: {
                card: "summary_large_image",
                title: "{title}",
                description: "{description}",
              },
            };
            
        
        import_check:
          check: "import { Metadata } from 'next' が存在するか"
          if_not_exists: "ファイルの先頭に import { Metadata } from 'next'; を追加"
  
  output:
    template: |
      ✅ app/layout.tsx に metadata を設定しました
      
      【基本情報】
      - title: {title}（{文字数} 文字）
      - description: {description}（{文字数} 文字）
      - keywords: [{keywords}]
      
      【SNS対応】
      - openGraph: 設定完了
      - twitter: 設定完了

# =============================================================================
# ワークフロー3: sitemap.ts 作成
# =============================================================================
workflow_3_sitemap:
  
  name: "app/sitemap.ts を作成"
  description: "Next.js の動的サイトマップ生成機能を使用"
  
  process:
    step_1:
      action: "ベースURL を取得"
      source: "vercel.json の destination"
      extraction: |
        1. vercel.json を read_file で読み込む
        2. redirects[].destination から "https://www.{DOMAIN}/:path*" を探す
        3. "/:path*" を削除して "https://www.{DOMAIN}" を抽出
      pattern: "https://[^/:]+"
      fallback: "vercel.json がなければユーザーに確認"
    
    step_2:
      action: "ページ一覧を取得（ファイルシステムのみ）"
      
      important_note: |
        🚨 重要: ファイルシステム上の page.tsx のみを検出する。
        コード内のリンク（<a href="...">, <Link href="...">）は検出しない。
        外部URLは絶対に含めない。
      
      method:
        tool: "grep または glob_file_search"
        pattern: "**/page.tsx"
        target: "app/ ディレクトリ"
        example_command: 'find app -name "page.tsx"'
      
      detection_result:
        description: "検出されるのはファイルパスのみ"
        examples:
          - "app/page.tsx"
          - "app/about/page.tsx"
          - "app/company/page.tsx"
          - "app/blog/[slug]/page.tsx"
        
        not_detected:
          - "コード内の <a href='https://google.com'> ← 検出しない"
          - "コード内の <Link href='/about'> ← 検出しない"
          - "外部URL ← 検出しない"
      
      conversion_rules:
        description: "ファイルパスをURLパスに変換（5ステップ）"
        
        step_1: "app/ プレフィックスを削除"
        step_2: "/page.tsx サフィックスを削除"
        step_3: "空文字列の場合は / にする"
        step_4: "末尾に / を追加（/ 以外）"
        step_5: "[slug], [id] などを含む場合は親ディレクトリまで"
        
        examples:
          - input: "app/page.tsx"
            output: "/"
          
          - input: "app/about/page.tsx"
            step_1: "about/page.tsx"
            step_2: "about/"
            output: "/about/"
          
          - input: "app/blog/[slug]/page.tsx"
            step_1: "blog/[slug]/page.tsx"
            step_2: "blog/[slug]/"
            step_5: "blog/（[slug] を削除）"
            output: "/blog/"
        
        dynamic_route_handling:
          rule: "[slug], [id], [...slug] を含むパスは親ディレクトリまで"
          reason: "具体的な値が不明なため、一覧ページのみ含める"
          pattern: "正規表現で \\[.*\\] を検出し削除"
    
    step_3:
      action: "app/sitemap.ts を生成"
      
      template: |
        import type { MetadataRoute } from 'next';

        export default function sitemap(): MetadataRoute.Sitemap {
          const baseUrl = '{BASE_URL}';
          
          const routes = [
            {ROUTES}
          ];

          return routes.map((route) => ({
            url: `${baseUrl}${route}`,
            lastModified: new Date(),
            changeFrequency: 'monthly' as const,
            priority: route === '/' ? 1.0 : 0.8,
          }));
        }
      
      validation:
        - "ベースURL が https:// で始まる"
        - "すべてのページが含まれる"
        - "末尾スラッシュが統一されている"
  
  output:
    template: |
      ✅ app/sitemap.ts を作成しました
      
      - ベースURL: {BASE_URL}
      - 対象ページ数: {PAGE_COUNT}件
      - 生成URL: /sitemap.xml

# =============================================================================
# ワークフロー4: robots.txt 作成
# =============================================================================
workflow_4_robots:
  
  name: "public/robots.txt を作成"
  description: "検索エンジンのクローラーを制御"
  
  process:
    step_1:
      action: "ベースURL を取得"
      
      source: "workflow_3 で取得した BASE_URL を再利用"
      
      fallback: |
        workflow_3 で BASE_URL を取得していない場合:
        1. vercel.json を read_file で読み込む
        2. redirects[].destination から "https://www.{DOMAIN}" を抽出
    
    step_2:
      action: "public/robots.txt を生成"
      
      method:
        tool: "write"
        target: "public/robots.txt"
      
      content_template: |
        User-agent: *
        Allow: /
        
        Sitemap: {BASE_URL}/sitemap.xml
      
      validation:
        - "User-agent: * が含まれる"
        - "Allow: / が含まれる"
        - "Sitemap URL が https:// で始まる"
  
  output:
    template: |
      ✅ public/robots.txt を作成しました
      
      内容:
      - User-agent: * （すべてのクローラーを許可）
      - Allow: / （すべてのパスを許可）
      - Sitemap: {BASE_URL}/sitemap.xml

# =============================================================================
# ワークフロー5: URLスラッグ最適化
# =============================================================================
workflow_5_url_slug:
  
  name: "URLスラッグを最適化"
  description: "サイトの内容を分析して、SEOフレンドリーなURL設計を提案"
  
  process:
    step_1:
      action: "日本語ディレクトリを検出"
      
      method:
        tool: "list_dir"
        target: "app/"
        
        detection: |
          app/ 配下のディレクトリ名を取得し、
          日本語（ひらがな、カタカナ、漢字）や特殊文字を含むものを検出。
      
      examples:
        - '✅ 検出: app/会社概要/'
        - '✅ 検出: app/お問い合わせ/'
        - '✅ 検出: app/サービス紹介/'
        - '❌ スキップ: app/company/'
    
    step_2:
      action: "各ディレクトリの page.tsx を読み込んでコンテンツを分析"
      
      method:
        tool: "read_file"
        
        process: |
          1. step_1 で検出した日本語ディレクトリのリストを取得
          2. 各ディレクトリに対して以下を実行：
             - read_file で {directory}/page.tsx を読み込む
             - コンテンツを分析
        
        example: |
          step_1 の結果: ["app/会社概要/", "app/サービス紹介/", "app/お問い合わせ/"]
          
          実行:
          - read_file("app/会社概要/page.tsx")
          - read_file("app/サービス紹介/page.tsx")
          - read_file("app/お問い合わせ/page.tsx")
      
      analysis_materials:
        1_h1_tag:
          source: "h1タグのテキスト"
          examples:
            - "<h1>会社概要</h1> → 会社概要"
            - "<h1>お問い合わせ</h1> → お問い合わせ"
            - "<h1>サービス紹介</h1> → サービス紹介"
        
        2_metadata_title:
          source: "metadata.title（存在する場合）"
          examples:
            - "title: 会社概要 | 株式会社〇〇 → 会社概要"
        
        3_main_content:
          source: "ページの主要コンテンツ"
          examples:
            - "校閲サービスの紹介... → サービス"
            - "会社の沿革... → 会社概要"
        
        4_navigation_label:
          source: "ナビゲーションメニューのラベル"
          examples:
            - "<Link href='/会社概要'>会社概要</Link> → 会社概要"
    
    step_3:
      action: "コンテキストを分析して英語スラッグを生成"
      
      generation_algorithm: |
        1. ページのコンテンツを分析（h1, metadata, 本文）
        2. ディレクトリの役割を特定（会社概要、サービス、お問い合わせなど）
        3. 汎用的な変換表を参照
        4. コンテンツに応じて最適な英語を選択
        5. SEOフレンドリーな形式に変換（小文字、ハイフン区切り）
      
      common_translations:
        general:
          - "会社概要 → company"
          - "会社情報 → company"
          - "お問い合わせ → contact"
          - "問い合わせ → contact"
          - "事業内容 → business"
          - "実績 → works"
          - "採用情報 → recruit"
          - "ニュース → news"
          - "ブログ → blog"
        
        service_related:
          - "サービス → services"
          - "サービス紹介 → services"
          - "サービス一覧 → services"
          - "ソリューション → solutions"
        
        context_based:
          - "コンテンツに「校閲」が多い → proofreading"
          - "コンテンツに「制作」が多い → production"
          - "コンテンツに「技術」が多い → technology"
      
      slug_rules:
        - "小文字のみ使用"
        - "単語の区切りはハイフン（-）"
        - "スペースは削除またはハイフンに変換"
        - "簡潔に（1-2単語推奨）"
      
      examples:
        example_1:
          directory: "app/会社概要/"
          page_content:
            h1: "会社概要"
            content: "株式会社メディアプルーフの概要..."
          analysis: "会社情報のページ"
          generated_slug: "company"
        
        example_2:
          directory: "app/サービス紹介/"
          page_content:
            h1: "サービス紹介"
            content: "校閲サービス、ニュース番組..."
          analysis: "サービス一覧のページ"
          generated_slug: "services"
        
        example_3:
          directory: "app/お問い合わせ/"
          page_content:
            h1: "お問い合わせ"
            content: "お気軽にお問い合わせください..."
          analysis: "問い合わせフォームのページ"
          generated_slug: "contact"
        
        example_4:
          directory: "app/校閲について/"
          page_content:
            h1: "校閲サービスについて"
            content: "高度な校閲で品質を担保..."
          analysis: "校閲サービス紹介のページ（サイト固有）"
          generated_slug: "proofreading"
    
    step_4:
      action: "提案を出力（実装はユーザーが手動で実施）"
      
      note: |
        🚨 重要: このワークフローは提案のみを行います。
        実際のディレクトリのリネームはユーザーが手動で行う必要があります。
        
        理由: ディレクトリ移動は以下の影響があるため：
        - Git 履歴への影響
        - import パスの一括変更が必要
        - ビルドエラーのリスク
  
  output:
    template: |
      ✅ URLスラッグを最適化しました
      
      【現状】
      日本語を含むディレクトリ:
      - {japanese_dir_1}（内容: {content_summary_1}）
      - {japanese_dir_2}（内容: {content_summary_2}）
      
      【推奨される変更】
      - {current_1} → {suggested_1}（理由: {reason_1}）
      - {current_2} → {suggested_2}（理由: {reason_2}）
      
      ⚠️ リネーム手順:
      ディレクトリのリネームは以下の手順で手動で実施してください：
      
      1. git mv {current} {suggested}
      2. すべてのリネームが完了してから git commit
      3. git push origin main
      
      💡 注意:
      - ディレクトリをリネームすると、import パスも変更が必要です
      - Next.js が自動的に更新しますが、ビルドエラーが出る場合は手動で修正してください

# =============================================================================
# 実行順序
# =============================================================================
execution_order:
  description: "「Google提出」トリガーで以下の順序で実行"
  
  steps:
    - order: 1
      workflow: "workflow_1_alt_tags"
      name: "altタグ設定"
    
    - order: 2
