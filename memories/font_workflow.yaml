# フォント自動化ワークフロー v2.0（複数選択対応）

## AIアシスタントの動作フロー

### ユーザーが「かわいいフォントにしたい」などと言った場合の対応手順

#### **重要：チャット内で完結させる**

ユーザーとの対話でフォントを選択し、コマンドを自動実行します。

---

## 📋 実行フロー

### ステップ1：プロジェクト初期設定を確認・実行

```bash
npm run setup-font-project
```

このコマンドは何度実行しても安全（冪等性あり）

---

### ステップ2：フォント選択を提示

#### ユーザーが「かわいいフォントにしたい」と言った場合：

**AIの応答例：**

```
かわいいフォントですね！
見出し用フォントを選んでください：

1) Zen Maru Gothic（丸ゴシック） - やわらかい印象
2) M PLUS Rounded 1c（丸み） - 親しみやすい
3) Hannari（はんなり） - 日本的なやさしさ

どれにしますか？（番号で答えてください）
```

**ユーザーが「1」と答えた場合：**

```
承知しました！次は本文用フォントを選んでください：

1) Zen Kaku Gothic New（ゴシック） - 読みやすい
2) Kosugi Maru（丸ゴシック） - やわらかい
3) Kokoro（やさしい） - ほのぼの

どれにしますか？（番号で答えてください）
```

**ユーザーが「2」と答えた場合：**

```
承知しました！
見出し：Zen Maru Gothic
本文：Kosugi Maru
でセットアップします。
```

---

### ステップ3：コマンドを実行

```bash
npm run setup-font-project && node scripts/setup-fonts.js kawaii --display=zen-maru --body=kosugi-maru
```

---

## 🎨 各カテゴリの選択肢マッピング

### kawaii（かわいい）

**見出し用：**
- 選択肢1 → `zen-maru` → Zen Maru Gothic（丸ゴシック）
- 選択肢2 → `mplus-rounded` → M PLUS Rounded 1c（丸み）
- 選択肢3 → `hannari` → Hannari（はんなり）

**本文用：**
- 選択肢1 → `zen-kaku` → Zen Kaku Gothic New（ゴシック）
- 選択肢2 → `kosugi-maru` → Kosugi Maru（丸ゴシック）
- 選択肢3 → `kokoro` → Kokoro（やさしい）

### elegant（上品・高級感）

**見出し用：**
- 選択肢1 → `cormorant` → Cormorant Garamond（セリフ体）
- 選択肢2 → `shippori-mincho` → Shippori Mincho（明朝体）
- 選択肢3 → `noto-serif` → Noto Serif JP（明朝体）

**本文用：**
- 選択肢1 → `noto-serif` → Noto Serif JP（明朝体）
- 選択肢2 → `shippori-mincho-b1` → Shippori Mincho B1（明朝体）
- 選択肢3 → `zen-kaku` → Zen Kaku Gothic New（ゴシック）

### natural（やさしい・ナチュラル）

**見出し用：**
- 選択肢1 → `noto-sans` → Noto Sans JP（ゴシック）
- 選択肢2 → `zen-maru` → Zen Maru Gothic（丸ゴシック）
- 選択肢3 → `sawarabi-gothic` → Sawarabi Gothic（さわらび）

**本文用：**
- 選択肢1 → `zen-maru` → Zen Maru Gothic（丸ゴシック）
- 選択肢2 → `noto-sans` → Noto Sans JP（ゴシック）

### cool（かっこいい）

**見出し用：**
- 選択肢1 → `poppins` → Poppins（モダン）
- 選択肢2 → `ibm-plex` → IBM Plex Sans JP（テック）
- 選択肢3 → `montserrat` → Montserrat（スタイリッシュ）

**本文用：**
- 選択肢1 → `noto-sans` → Noto Sans JP（ゴシック）
- 選択肢2 → `zen-kaku` → Zen Kaku Gothic New（ゴシック）

### simple（シンプル）

**見出し用：**
- 選択肢1 → `inter` → Inter（モダン）
- 選択肢2 → `noto-sans` → Noto Sans JP（ゴシック）
- 選択肢3 → `zen-kaku` → Zen Kaku Gothic New（ゴシック）

**本文用：**
- 選択肢1 → `zen-kaku` → Zen Kaku Gothic New（ゴシック）
- 選択肢2 → `noto-sans` → Noto Sans JP（ゴシック）

### pop（ポップ）

**見出し用：**
- 選択肢1 → `zen-kaku-bold` → Zen Kaku Gothic New（太字）
- 選択肢2 → `rocknroll` → RocknRoll One（ポップ）
- 選択肢3 → `rampart` → Rampart One（インパクト）

**本文用：**
- 選択肢1 → `zen-kaku` → Zen Kaku Gothic New（ゴシック）
- 選択肢2 → `mplus1p` → M PLUS 1p（読みやすい）

### wa（和風）

**見出し用：**
- 選択肢1 → `shippori-mincho` → Shippori Mincho（明朝体）
- 選択肢2 → `yuji-syuku` → Yuji Syuku（筆文字風）
- 選択肢3 → `klee-one` → Klee One（手書き風）

**本文用：**
- 選択肢1 → `zen-kaku` → Zen Kaku Gothic New（ゴシック）
- 選択肢2 → `shippori-mincho-b1` → Shippori Mincho B1（明朝体）
- 選択肢3 → `noto-serif` → Noto Serif JP（明朝体）

